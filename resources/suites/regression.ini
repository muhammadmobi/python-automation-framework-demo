# Regression suite — the pytest analogue of the sibling demos' regression.xml.
# Runs the full suite (smoke + regression). Run with:
#   pytest -c resources/suites/regression.ini
[pytest]
addopts = -ra -q --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: fast, critical-path checks
    regression: broader coverage run on every push
    dependency: ordered dependency chains (pytest-dependency)
