# Smoke suite — the pytest analogue of the sibling demos' smoke.xml.
# Run with:  pytest -c resources/suites/smoke.ini
[pytest]
addopts = -ra -q --strict-markers -m smoke
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: fast, critical-path checks
    regression: broader coverage run on every push
    dependency: ordered dependency chains (pytest-dependency)
