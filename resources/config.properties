# ---------------------------------------------------------------------------
# MHub framework configuration (PLACEHOLDERS where noted).
# Any value is overridable at runtime via an environment variable whose name is
# the key upper-cased with dots -> underscores, e.g.:
#     MHUB_TRANSPORT=aws  DEVICE_ID=MHA40186800012  TIMEOUT_RESPONSE=20  pytest
# (the Python equivalent of Appium's  mvn test -Dkey=value  overrides).
# ---------------------------------------------------------------------------

# Transport: "inproc" (bundled virtual hub, offline) or "aws" (real AWS IoT Core)
mhub.transport=inproc
device.id=MHUB-DEMO-DEVICE-001

# AWS IoT Core endpoint (only used when mhub.transport=aws) — PLACEHOLDERS
mqtt.endpoint=your-endpoint.iot.eu-west-1.amazonaws.com
mqtt.port=8883
mqtt.clientId=mhub-demo-
mqtt.rootCaPath=Credentials/root-ca.pem
mqtt.privateKeyPath=Credentials/private.key
mqtt.certPath=Credentials/certificate.pem

# Virtual-hub simulator behaviour
sim.latencySeconds=0

# Waits (seconds) — the MQTT analogue of Appium's implicit/explicit timeouts
timeout.response=10
